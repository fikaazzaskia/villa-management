[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.zip", "php82Extensions.curl", "composer"]

[phases.build]
cmds = ["composer install --no-dev", "npm install", "npm run build"]

[start]
cmd = "php artisan migrate:fresh --force && php artisan serve --host=0.0.0.0 --port=$PORT"
